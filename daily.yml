name: 🏥 APHP Job Bot — Veille quotidienne

on:
  schedule:
    - cron: '0 7 * * *'   # Tous les jours à 7h00 UTC (9h Paris)
  workflow_dispatch:        # Permet aussi le lancement manuel depuis GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installer les dépendances Python
        run: pip install -r requirements.txt

      - name: 🎭 Installer Playwright (navigateur Chromium)
        run: playwright install chromium --with-deps

      - name: 🚀 Lancer le bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:   ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py
